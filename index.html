<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Phena School Manager | Smart School Management System</title>

    <meta
      name="description"
      content="Phena School Manager is a modern school management system for admissions, student records, fees, billing, payments, communication, and academic administration."
    />

    <meta
      name="keywords"
      content="Phena School Manager, Phena SMS, school management system, school fees software, student records, school billing, school administration software, Ghana schools"
    />

    <meta name="author" content="Phena Systems" />
    <meta name="theme-color" content="#2563eb" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />

    <!-- Font -->
    <link href="https://fonts.cdnfonts.com/css/lato" rel="stylesheet" />

    <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Phena School Manager" />
    <meta
      property="og:description"
      content="Manage students, fees, billing, payments, academic records, and school operations from one modern platform."
    />
    <meta property="og:site_name" content="Phena School Manager" />
    <meta property="og:url" content="https://phenaschool.com" />

    <!-- Replace this with a real preview image later, e.g. /social-preview.png -->
    <meta property="og:image" content="https://phenaschool.com/favicon.ico" />

    <!-- Twitter / X Preview -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Phena School Manager" />
    <meta
      name="twitter:description"
      content="A modern platform for school fees, student profiles, billing, payments, and academic management."
    />
    <meta name="twitter:image" content="https://phenaschool.com/favicon.ico" />

    <!-- Browser behavior -->
    <meta name="robots" content="index, follow" />

    <!-- Optional: Better loading appearance before Vue mounts -->
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: 'Lato', Arial, sans-serif;
        background: #ffffff;
      }

      #app {
        min-height: 100vh;
      }

      .app-loading {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 32%),
          linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        color: #0f172a;
      }

      .loading-card {
        text-align: center;
        padding: 32px;
      }

      .loading-logo {
        width: 74px;
        height: 74px;
        margin: 0 auto 18px;
        border-radius: 22px;
        background: linear-gradient(135deg, #2563eb, #22c55e);
        color: #ffffff;
        display: grid;
        place-items: center;
        font-size: 34px;
        font-weight: 900;
        box-shadow: 0 18px 40px rgba(37, 99, 235, 0.25);
      }

      .loading-title {
        margin: 0;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      .loading-text {
        margin-top: 8px;
        color: #64748b;
        font-size: 15px;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div class="app-loading">
        <div class="loading-card">
          <div class="loading-logo">P</div>
          <h1 class="loading-title">Phena School Manager</h1>
          <p class="loading-text">Loading your school workspace...</p>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
